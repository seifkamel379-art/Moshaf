kind = "mobile"
previewPath = "/"
title = "المصحف المثمن"
version = "1.0.0"
id = "artifacts/mushaf"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18643

[services.development]
run = "pnpm --filter @workspace/mushaf run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mushaf", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mushaf", "run", "serve" ]

[services.env]
PORT = "18643"
BASE_PATH = "/"
